<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Sistemas Información II</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="recursos/css/estilos.css">
</head>
<body>
    <nav class="navbar-main">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-2">
                    <a class="navbar-brand" href="index.html">
                        <i class="bi bi-bag-heart-fill"></i>
                        Sistemas<span>Info</span>
                    </a>
                </div>
                <div class="col-md-6">
                    <form class="search-box">
                        <input type="text" placeholder="Buscar productos...">
                        <button type="submit"><i class="bi bi-search"></i> Buscar</button>
                    </form>
                </div>
                <div class="col-md-4">
                    <div class="nav-actions">
                        <a href="carrito.html"><i class="bi bi-cart3"></i> Carrito</a>
                        <a href="login.html"><i class="bi bi-person"></i> Mi Cuenta</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2><i class="bi bi-key"></i> Recuperar Contraseña</h2>
            <p class="subtitle">Ingresa tu correo para recuperar tu contraseña</p>
            
            <div id="mensaje-error" class="alert alert-error d-none"></div>
            <div id="mensaje-success" class="alert alert-success d-none"></div>

            <form id="recuperarForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
                <button type="submit" class="btn-primary">Enviar Enlace de Recuperación</button>
            </form>
            
            <div class="link-auth">
                <a href="login.html">Volver a Iniciar Sesión</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_URL = 'http://localhost:8090/api';
        
        $('#recuperarForm').on('submit', function(e) {
            e.preventDefault();
            
            $.ajax({
                url: API_URL + '/recuperar',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({email: $('#email').val()}),
                success: function(respuesta) {
                    if (respuesta.success) {
                        $('#mensaje-success').removeClass('d-none').text(respuesta.message);
                    } else {
                        $('#mensaje-error').removeClass('d-none').text(respuesta.message);
                    }
                },
                error: function(xhr) {
                    $('#mensaje-error').removeClass('d-none').text('Error al procesar la solicitud');
                }
            });
        });
    </script>
</body>
</html>
