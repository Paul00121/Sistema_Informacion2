<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Sistemas Información II</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/recursos/css/estilos.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F0F2F5; min-height: 100vh; }
        .navbar-main { background: #232F3E; padding: 14px 0; }
        .navbar-main .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
        .navbar-main .navbar-brand { color: #fff; font-size: 1.4rem; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .navbar-main .navbar-brand span { color: #FF9900; }

        .register-wrapper { display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
        .register-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 520px; padding: 40px 36px; }
        .register-header { text-align: center; margin-bottom: 28px; }
        .register-header h1 { font-size: 24px; font-weight: 700; color: #131A22; }
        .register-header p { color: #6B7280; font-size: 14px; margin-top: 6px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #FF9900; box-shadow: 0 0 0 3px rgba(255,153,0,0.15); }

        .btn-primary { width: 100%; padding: 13px; background: #FF9900; color: #131A22; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
        .btn-primary:hover { background: #E88A00; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .alert-danger { background: #FEE2E2; color: #DC2626; border: 1px solid #FECACA; display: block; }
        .alert-success { background: #D1FAE5; color: #059669; border: 1px solid #A7F3D0; display: block; }

        .footer-links { text-align: center; margin-top: 20px; font-size: 13px; color: #6B7280; }
        .footer-links a { color: #FF9900; text-decoration: none; font-weight: 500; }
        .footer-links a:hover { text-decoration: underline; }

        .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(19,26,34,0.2); border-top-color: #131A22; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar-main">
        <div class="container">
            <a class="navbar-brand" href="/index.html">
                <i class="bi bi-bag-heart-fill"></i> Sistemas<span>Info</span>
            </a>
        </div>
    </nav>

    <div class="register-wrapper">
        <div class="register-card">
            <div class="register-header">
                <h1>Crear Cuenta</h1>
                <p>Regístrate para empezar a comprar</p>
            </div>

            <div id="errorAlert" class="alert alert-danger" style="display:none"></div>
            <div id="successAlert" class="alert alert-success" style="display:none"></div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" required placeholder="Juan">
                    </div>
                    <div class="form-group">
                        <label for="apellido">Apellido Paterno</label>
                        <input type="text" id="apellido" required placeholder="Pérez">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" required placeholder="tu@correo.com">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required minlength="6" placeholder="Mín. 6 caracteres">
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="number" id="telefono" placeholder="71234567">
                    </div>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" placeholder="Calle, #, Zona">
                </div>

                <input type="hidden" id="tipoUsuario" value="cliente">

                <button type="submit" class="btn-primary" id="registerBtn">
                    <span id="btnText">Crear Cuenta</span>
                    <span class="spinner" id="btnSpinner"></span>
                </button>
            </form>

            <div class="footer-links">
                <p>¿Ya tienes cuenta? <a href="/auth/login.html">Inicia Sesión</a></p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('registerBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');

        function showError(msg) {
            errorAlert.textContent = msg;
            errorAlert.style.display = 'block';
            successAlert.style.display = 'none';
        }

        function showSuccess(msg) {
            successAlert.textContent = msg;
            successAlert.style.display = 'block';
            errorAlert.style.display = 'none';
        }

        function hideAlerts() {
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
        }

        function setLoading(loading) {
            btn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            btnSpinner.style.display = loading ? 'inline-block' : 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlerts();
            setLoading(true);

            const payload = {
                nombre: document.getElementById('nombre').value.trim(),
                apellido_paterno: document.getElementById('apellido').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                telefono: parseInt(document.getElementById('telefono').value) || 0,
                direccion: document.getElementById('direccion').value.trim(),
                tipo_usuario: 'cliente',
                tipo_suscripcion: 'free'
            };

            const res = await Auth.register(payload);

            if (res.ok && res.data && res.data.success) {
                showSuccess('Cuenta creada exitosamente. Redirigiendo...');
                Auth.saveSession(res.data);
                setTimeout(() => Auth.redirectAfterLogin(res.data.data), 600);
            } else {
                const msg = res.data?.message || 'Error al crear la cuenta';
                showError(msg);
                setLoading(false);
            }
        });
    </script>
</body>
</html>
