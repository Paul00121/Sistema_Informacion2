<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistemas Información II</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="recursos/css/estilos.css">
    <style>
        .d-none { display: none !important; }
    </style>
</head>
<body>
    <!-- Navbar Principal -->
    <nav class="navbar-main">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-2">
                    <a class="navbar-brand" href="index.html">
                        <i class="bi bi-bag-heart-fill"></i>
                        Sistemas<span>Info</span>
                    </a>
                </div>
                <div class="col-md-6">
                    <form class="search-box">
                        <input type="text" placeholder="Buscar productos...">
                        <button type="submit"><i class="bi bi-search"></i> Buscar</button>
                    </form>
                </div>
                <div class="col-md-4">
                    <div class="nav-actions">
                        <a href="carrito.html"><i class="bi bi-cart3"></i> Carrito</a>
                        <a href="login.html"><i class="bi bi-person"></i> Mi Cuenta</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Formulario de Login -->
    <div class="auth-container">
        <div class="auth-card">
            <h2><i class="bi bi-person-circle"></i> Hola, Bienvenido</h2>
            <p class="subtitle">Inicia sesión para continuar</p>
            
            <div id="mensaje-error" class="alert alert-error d-none"></div>
            <div id="mensaje-success" class="alert alert-success d-none"></div>
            <div id="mensaje-info" class="alert alert-info d-none" style="background: #DBEAFE; color: #1E40AF; border: 1px solid #93C5FD;"></div>

            <form id="loginForm" method="POST">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group" style="text-align: right;">
                    <a href="recuperar.html" style="color: #FF9900; text-decoration: none; font-size: 0.9rem;">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn-primary">Iniciar Sesión</button>
            </form>
            
            <div class="link-auth">
                ¿Nuevo en SistemasInfo? <a href="registrar.html">Crea una cuenta</a>
            </div>
            
            <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #eee;">
                <p style="font-size: 0.85rem; color: #888; margin-bottom: 12px;">O continúa con</p>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button type="button" id="googleBtn" style="padding: 12px 24px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <img src="https://www.google.com/favicon.ico" width="16" height="16"> Google
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Completar Datos Google -->
    <div class="modal" id="completarDatosModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="background: white; max-width: 500px; margin: 100px auto; padding: 30px; border-radius: 12px;">
            <h3 style="margin-bottom: 20px;">Completa tus datos</h3>
            <form id="completarDatosForm">
                <div class="form-group">
                    <label>CI *</label>
                    <input type="text" id="gd_ci" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div class="form-group">
                    <label>Apellido Paterno *</label>
                    <input type="text" id="gd_apellido_paterno" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div class="form-group">
                    <label>Apellido Materno</label>
                    <input type="text" id="gd_apellido_materno" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="gd_telefono" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" id="gd_direccion" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <input type="hidden" id="gd_token">
                <input type="hidden" id="gd_nombre">
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">Guardar y Continuar</button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="recursos/js/config.js"></script>
    <script>
        const API_URL = CONFIG.API_URL;;
        
        // Verificar parámetros URL al cargar
        $(document).ready(function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.get('registrado') === '1') {
                $('#mensaje-success').removeClass('d-none').text('¡Registro exitoso! Revisa tu correo para verificar tu cuenta.');
            }
            
            if (urlParams.get('verificado') === '1') {
                $('#mensaje-success').removeClass('d-none').text('¡Cuenta verificada! Ahora puedes iniciar sesión.');
            }
            
            if (urlParams.get('error') === 'token-invalido') {
                $('#mensaje-error').removeClass('d-none').text('Token de verificación inválido.');
            }
            
            if (urlParams.get('paypal') === 'success') {
                const planId = urlParams.get('plan_id');
                const clienteCi = urlParams.get('cliente_ci');
                
                if (planId && clienteCi) {
                    procesarPagoExitoso(planId, clienteCi);
                } else {
                    $('#mensaje-success').removeClass('d-none').text('¡Pago procesado exitosamente! Ahora puedes iniciar sesión.');
                }
            }
            
            if (urlParams.get('paypal') === 'cancel') {
                $('#mensaje-info').removeClass('d-none').text('Pago cancelado. Puedes intentar nuevamente desde tu cuenta.');
            }
            
            // Procesar respuesta de Google Login (redirect)
            if (urlParams.get('google_success') === '1') {
                const userParam = urlParams.get('user');
                if (userParam) {
                    try {
                        const userData = JSON.parse(atob(userParam));
                        localStorage.setItem('usuario', JSON.stringify(userData));
                        if (userData.rol == 1) {
                            window.location.href = 'admin/index.html';
                        } else {
                            window.location.href = 'cliente/index.html';
                        }
                    } catch (e) {
                        console.error('Error al procesar datos de Google:', e);
                        $('#mensaje-error').removeClass('d-none').text('Error al iniciar sesión con Google.');
                    }
                }
            }
            
            // Procesar necesidad de completar datos de Google
            if (urlParams.get('google_completar') === '1') {
                const dataParam = urlParams.get('data');
                if (dataParam) {
                    try {
                        const data = JSON.parse(atob(dataParam));
                        $('#gd_token').val(data.token);
                        $('#gd_nombre').val(data.nombre || '');
                        $('#gd_apellido_paterno').val(data.apellido || '');
                        $('#completarDatosModal').show();
                    } catch (e) {
                        console.error('Error al procesar datos:', e);
                    }
                }
            }
            
            // Error de Google
            if (urlParams.get('error') === 'google_auth') {
                $('#mensaje-error').removeClass('d-none').text('Error de autenticación con Google.');
            }
            if (urlParams.get('error') === 'google_token') {
                $('#mensaje-error').removeClass('d-none').text('Error al obtener token de Google.');
            }
        });

        function procesarPagoExitoso(planId, clienteCi) {
            $.ajax({
                url: API_URL + '/paypal/capture-order',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    orderID: 'manual_capture',
                    plan_id: planId,
                    cliente_ci: clienteCi
                }),
                success: function(respuesta) {
                    $('#mensaje-success').removeClass('d-none').text('¡Pago completado! Tu plan ha sido activado. Inicia sesión.');
                },
                error: function() {
                    $('#mensaje-success').removeClass('d-none').text('¡Pago completado! Inicia sesión para activar tu plan.');
                }
            });
        }

// Login con Google - obtener config dinámicamente
        let googleClientId = null;
        let googleRedirectUri = null;
        
        // Obtener config de Google desde el backend
        fetch(API_URL + '/auth/google/config')
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    googleClientId = data.client_id;
                    googleRedirectUri = data.redirect_uri;
                } else {
                    console.warn('Google OAuth no configurado:', data.message);
                }
            })
            .catch(err => console.error('Error cargando config Google:', err));
        
        // Login con Google usando redirect
        $('#googleBtn').on('click', function() {
            if (!googleClientId || !googleRedirectUri) {
                $('#mensaje-error').removeClass('d-none').text('Google OAuth no está configurado. Contacta al administrador.');
                return;
            }
            
            // Construir URL de Google OAuth
            const googleAuthUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' + 
                'client_id=' + encodeURIComponent(googleClientId) +
                '&redirect_uri=' + encodeURIComponent(googleRedirectUri) +
                '&response_type=code' +
                '&scope=' + encodeURIComponent('email profile') +
                '&access_type=offline';
            
            console.log("Google URL:", googleAuthUrl);
            
            // Redirect a Google
            window.location.href = googleAuthUrl;
        });

        function iniciarSesionGoogle(code) {
            $.ajax({
                url: API_URL + '/google/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ code: code }),
                success: function(respuesta) {
                    if (respuesta.success) {
                        if (respuesta.completar_datos) {
                            // Mostrar modal para completar datos
                            $('#gd_token').val(respuesta.token);
                            $('#gd_nombre').val(respuesta.nombre);
                            $('#gd_apellido_paterno').val(respuesta.apellido || '');
                            $('#completarDatosModal').show();
                        } else {
                            // Login exitoso
                            localStorage.setItem('usuario', JSON.stringify(respuesta.data));
                            if (respuesta.data.rol == 1) {
                                window.location.href = 'admin/index.html';
                            } else {
                                window.location.href = 'cliente/index.html';
                            }
                        }
                    } else {
                        $('#mensaje-error').removeClass('d-none').text(respuesta.message);
                    }
                },
                error: function(xhr) {
                    let respuesta = xhr.responseJSON;
                    $('#mensaje-error').removeClass('d-none').text(respuesta?.message || 'Error con Google');
                }
            });
        }

        // Completar datos de Google
        $('#completarDatosForm').on('submit', function(e) {
            e.preventDefault();
            
            $.ajax({
                url: API_URL + '/google/completar-datos',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    token: $('#gd_token').val(),
                    nombre: $('#gd_nombre').val(),
                    ci: $('#gd_ci').val(),
                    apellido_paterno: $('#gd_apellido_paterno').val(),
                    apellido_materno: $('#gd_apellido_materno').val(),
                    numero_telefono: $('#gd_telefono').val(),
                    direccion: $('#gd_direccion').val()
                }),
                success: function(respuesta) {
                    if (respuesta.success) {
                        $('#completarDatosModal').hide();
                        localStorage.setItem('usuario', JSON.stringify(respuesta.data));
                        window.location.href = 'cliente/index.html';
                    } else {
                        alert(respuesta.message);
                    }
                },
                error: function(xhr) {
                    let respuesta = xhr.responseJSON;
                    alert(respuesta?.message || 'Error al guardar datos');
                }
            });
        });

        // Login normal
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            let email = $('#email').val();
            let password = $('#password').val();
            
            if (!email || !password) {
                $('#mensaje-error').removeClass('d-none').text('Completa todos los campos');
                return false;
            }

            $('#mensaje-error').addClass('d-none');
            $('#mensaje-success').addClass('d-none');
            
            $.ajax({
                url: API_URL + '/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({email: email, password: password}),
                success: function(respuesta) {
                    if (respuesta.success) {
                        localStorage.setItem('usuario', JSON.stringify(respuesta.data));
                        if (respuesta.data.rol == 1) {
                            window.location.href = 'admin/index.html';
                        } else {
                            window.location.href = 'cliente/index.html';
                        }
                    } else {
                        if (respuesta.code === 'email_no_verificado') {
                            $('#mensaje-error').removeClass('d-none').text('Por favor verifica tu correo electrónico. Revisa tu bandeja de entrada.');
                        } else {
                            $('#mensaje-error').removeClass('d-none').text(respuesta.message);
                        }
                    }
                },
                error: function(xhr) {
                    let respuesta = xhr.responseJSON;
                    let mensaje = 'Error de conexión';
                    if (respuesta && respuesta.message) {
                        mensaje = respuesta.message;
                        if (respuesta.code === 'email_no_verificado') {
                            mensaje = 'Por favor verifica tu correo electrónico. Revisa tu bandeja de entrada.';
                        }
                    } else if (xhr.responseText) {
                        try {
                            const parsed = JSON.parse(xhr.responseText);
                            mensaje = parsed.message || mensaje;
                        } catch(e) {}
                    }
                    $('#mensaje-error').removeClass('d-none').text(mensaje);
                }
            });
        });
    </script>
</body>
</html>
