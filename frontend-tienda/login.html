<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistemas Información II</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="recursos/css/estilos.css">
</head>
<body>
    <!-- Navbar Principal -->
    <nav class="navbar-main">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-2">
                    <a class="navbar-brand" href="index.html">
                        <i class="bi bi-bag-heart-fill"></i>
                        Sistemas<span>Info</span>
                    </a>
                </div>
                <div class="col-md-6">
                    <form class="search-box">
                        <input type="text" placeholder="Buscar productos...">
                        <button type="submit"><i class="bi bi-search"></i> Buscar</button>
                    </form>
                </div>
                <div class="col-md-4">
                    <div class="nav-actions">
                        <a href="carrito.html"><i class="bi bi-cart3"></i> Carrito</a>
                        <a href="login.html"><i class="bi bi-person"></i> Mi Cuenta</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Formulario de Login -->
    <div class="auth-container">
        <div class="auth-card">
            <h2><i class="bi bi-person-circle"></i> Hola, Bienvenido</h2>
            <p class="subtitle">Inicia sesión para continuar</p>
            
            <div id="mensaje-error" class="alert alert-error d-none"></div>
            <div id="mensaje-success" class="alert alert-success d-none"></div>

            <form id="loginForm" method="POST">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group" style="text-align: right;">
                    <a href="recuperar.html" style="color: #FF9900; text-decoration: none; font-size: 0.9rem;">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn-primary">Iniciar Sesión</button>
            </form>
            
            <div class="link-auth">
                ¿Nuevo en SistemasInfo? <a href="registrar.html">Crea una cuenta</a>
            </div>
            
            <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #eee;">
                <p style="font-size: 0.85rem; color: #888; margin-bottom: 12px;">O continúa con</p>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button type="button" id="googleBtn" style="padding: 12px 24px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <img src="https://www.google.com/favicon.ico" width="16" height="16"> Google
                    </button>
                    <button type="button" id="facebookBtn" style="padding: 12px 24px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #1877F2;">
                        <i class="bi bi-facebook"></i> Facebook
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const API_URL = 'http://localhost:8090/api';
        
        const CLIENT_ID = 'TU_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
        
        function onGoogleCredentialResponse(response) {
            if (response.credential) {
                const token = response.credential;
                const payload = JSON.parse(atob(token.split('.')[1]));
                const email = payload.email;
                
                $.ajax({
                    url: API_URL + '/login-social',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        email: email,
                        nombre: payload.name || email.split('@')[0],
                        provider: 'google'
                    }),
                    success: function(respuesta) {
                        localStorage.setItem('usuario', JSON.stringify(respuesta.data));
                        if (respuesta.data.rol == 1) {
                            window.location.href = 'admin/panel.html';
                        } else {
                            window.location.href = 'cliente/index.html';
                        }
                    }
                });
            }
        }
        
        function loginGoogle() {
            let email = prompt('Ingresa tu correo de Google:');
            if (email && email.includes('@')) {
                $.ajax({
                    url: API_URL + '/login-social',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({email: email, nombre: email.split('@')[0], provider: 'google'}),
                    success: function(respuesta) {
                        localStorage.setItem('usuario', JSON.stringify(respuesta.data));
                        if (respuesta.data.rol == 1) {
                            window.location.href = 'admin/panel.html';
                        } else {
                            window.location.href = 'cliente/index.html';
                        }
                    }
                });
            }
        }
        
        $('#googleBtn').on('click', loginGoogle);
        $('#facebookBtn').on('click', function() {
            alert('Facebook OAuth requiere configuración en Facebook Developers.');
        });
        
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            let email = $('#email').val();
            let password = $('#password').val();
            
            if (!email || !password) {
                $('#mensaje-error').removeClass('d-none').text('Completa todos los campos');
                return false;
            }
            
            $.ajax({
                url: API_URL + '/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({email: email, password: password}),
                success: function(respuesta) {
                    if (respuesta.success) {
                        localStorage.setItem('usuario', JSON.stringify(respuesta.data));
                        if (respuesta.data.rol == 1) {
                            window.location.href = 'admin/panel.html';
                        } else {
                            window.location.href = 'cliente/index.html';
                        }
                    } else {
                        $('#mensaje-error').removeClass('d-none').text(respuesta.message);
                    }
                },
                error: function(xhr) {
                    let respuesta = xhr.responseJSON;
                    let mensaje = 'Error de conexión';
                    if (respuesta && respuesta.message) {
                        mensaje = respuesta.message;
                    } else if (xhr.responseText) {
                        try {
                            const parsed = JSON.parse(xhr.responseText);
                            mensaje = parsed.message || mensaje;
                        } catch(e) {}
                    }
                    $('#mensaje-error').removeClass('d-none').text(mensaje);
                }
            });
        });
    </script>
</body>
</html>
